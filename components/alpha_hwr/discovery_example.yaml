# ============================================================================
# ALPHA HWR Discovery Example
# ============================================================================
#
# This example demonstrates how to automatically discover ALPHA HWR pumps
# without knowing the MAC address in advance. Use this configuration to
# scan for and identify ALPHA HWR devices on your network.
#
# Once you have the MAC address, you can use it in your main configuration
# (see hwr-pump.yaml for the full example with sensors).
#
# ============================================================================

esphome:
  name: alpha-hwr-discovery
  friendly_name: ALPHA HWR Discovery

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: DEBUG

api:

esp32_ble_tracker:
  scan_parameters:
    interval: 1.1s
    window: 1.1s
    active: true

  # Discover by Grundfos Service Data UUID (matches the actual pump
  # advertisement; the Python reference implementation uses the same method).
  # The pump uses AD type 0x16 (Service Data, 16-bit UUID) with UUID 0xFE5D.
  # In on_ble_advertise the lambda receives `x` as the full ESPBTDevice, so we
  # can report the MAC address alongside the product bytes.  Service data
  # layout (ESPHome strips the 2-byte UUID):
  #   data[0..2]: 3-byte frame header
  #   data[3]:    product_family  (0x34 = ALPHA)
  #   data[4]:    product_type    (0x07 = HWR)
  #   data[5]:    product_version (BLE firmware version discriminator)
  on_ble_advertise:
    - then:
        - lambda: |-
            for (const auto &svc_data : x.get_service_datas()) {
              esp_bt_uuid_t uuid = svc_data.uuid.get_uuid();
              if (uuid.len != ESP_UUID_LEN_16 || uuid.uuid.uuid16 != 0xFE5D)
                continue;
              const auto &d = svc_data.data;
              if (d.size() >= 6 && d[3] == 0x34 && d[4] == 0x07) {
                ESP_LOGI("alpha_hwr_discovery",
                         "═══════════════════════════════════════════════");
                ESP_LOGI("alpha_hwr_discovery",
                         "Found ALPHA HWR Pump!");
                ESP_LOGI("alpha_hwr_discovery",
                         "  MAC Address: %s", x.address_str().c_str());
                ESP_LOGI("alpha_hwr_discovery",
                         "  RSSI: %d dBm", x.get_rssi());
                ESP_LOGI("alpha_hwr_discovery",
                         "  Name: %s", x.get_name().c_str());
                ESP_LOGI("alpha_hwr_discovery",
                         "  Product version: 0x%02X", d[5]);
                ESP_LOGI("alpha_hwr_discovery",
                         "═══════════════════════════════════════════════");
              }
            }

# ============================================================================
# Usage Instructions:
# ============================================================================
#
# 1. Flash this configuration to your ESP32 device
# 2. Open the logs (esphome logs alpha-hwr-discovery.yaml)
# 3. Wait for the discovery logs - they will show any ALPHA HWR pumps found
# 4. Note the MAC address from the logs
# 5. Update your main configuration (hwr-pump.yaml) with the discovered MAC
# 6. Flash your main configuration to connect and read sensor data
#
# The discovery method (Grundfos service data UUID FE5D + product bytes) is
# the most reliable and will work with all ALPHA HWR pumps regardless of
# firmware.
#
# ============================================================================
