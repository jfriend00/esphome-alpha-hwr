esphome:
  name: dhw-detector
  friendly_name: DHW Detector

# ==============================================================================
# DHW Demand Detector — Example Configuration
# ==============================================================================
#
# On-device DHW demand detection using pump telemetry and Home Assistant sensors.
# Detection results appear automatically in Home Assistant via the native API.
#
# Setup Instructions:
# 1. Replace the MAC address below with your ALPHA HWR pump's BLE MAC address
# 2. Set the three HA entity substitutions to match your installation
# 3. Update WiFi credentials (or copy secrets-example.yaml to secrets.yaml)
# 4. Flash to your ESP32
#
# Sensors published to Home Assistant:
#   binary_sensor.dhw_demand         — ON when hot water is being drawn
#   sensor.dhw_detection_confidence  — Detection certainty (0.0–1.0)
#   sensor.dhw_session_duration      — Seconds since session started (live)
#   text_sensor.dhw_detection_method — Which signal(s) triggered demand
#
# For standalone use (no pump), remove the alpha_hwr package and the
# pump sensor keys from dhw_demand: below. Pump-off detection via the
# flow meter, tank temperature, and DHW charge still works fully.
# ==============================================================================

substitutions:
  mac_address: "AA:BB:CC:DD:EE:FF"  # ← CHANGE THIS to your pump's MAC

  # ── Home Assistant entity IDs for supplementary sensors ────────────────────
  flow_entity:            sensor.droplet_f5bc_flow_rate      # ← CHANGE
  tank_lower_temp_entity: sensor.nwp500_tank_lower_temperature  # ← CHANGE
  dhw_charge_entity:      sensor.nwp500_dhw_charge           # ← CHANGE

packages:
  alpha_hwr: github://eman/esphome-alpha-hwr/packages/alpha_hwr_pairing.yaml@main
  dhw_demand: github://eman/esphome-alpha-hwr/packages/dhw_demand_detector.yaml@main

# Override component source to use local development files instead of GitHub cache.
# Remove or comment this block when deploying from the published GitHub packages.
external_components:
  - source:
      type: local
      path: components
    components: [alpha_hwr, dhw_demand]

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
logger:
ota:
  platform: esphome

# ── Alpha HWR sensor IDs ───────────────────────────────────────────────────────
#
# Give the pump sensors stable IDs so dhw_demand: can reference them below.
# These merge with the sensor declarations already made by alpha_hwr_pairing.yaml.

alpha_hwr:
  current:
    id: motor_current_sensor
  power:
    id: pump_power_sensor
  rpm:
    id: motor_speed_sensor
  flow:
    id: flow_rate_sensor
  inlet_pressure:
    id: inlet_pressure_sensor
  head_rate:
    id: pump_head_rate_sensor

# ── Unit-converted pump sensor intermediates ──────────────────────────────────
#
# alpha_hwr reports flow in m³/h and pressure in bar.
# The detector thresholds use GPM and PSI, so we create converted copies.

sensor:
  # Pump flow: m³/h → GPM  (1 m³/h = 4.40287 GPM)
  - platform: copy
    source_id: flow_rate_sensor
    id: dhw_pump_flow_gpm
    name: ""
    internal: true
    unit_of_measurement: "GPM"
    filters:
      - multiply: 4.40287

  # Inlet pressure: bar → PSI  (1 bar = 14.5038 PSI)
  - platform: copy
    source_id: inlet_pressure_sensor
    id: dhw_inlet_pressure_psi
    name: ""
    internal: true
    unit_of_measurement: "PSI"
    filters:
      - multiply: 14.5038

  # Optional: NWP500 DHW in-use flag — provides a small confidence boost.
  # Remove if no NWP500 or equivalent is present.
  - platform: homeassistant
    id: dhw_in_use_flag
    entity_id: sensor.nwp500_dhw_in_use

# ── DHW Demand Detector — pump telemetry wiring ────────────────────────────────
#
# Adds pump sensor references to the detector component declared by the package.

dhw_demand:
  motor_speed:    motor_speed_sensor
  motor_current:  motor_current_sensor
  inlet_pressure: dhw_inlet_pressure_psi
  pump_flow:      dhw_pump_flow_gpm
  pump_power:     pump_power_sensor
  pump_head_rate: pump_head_rate_sensor
  # Optional: comment out if no NWP500
  dhw_in_use:     dhw_in_use_flag
