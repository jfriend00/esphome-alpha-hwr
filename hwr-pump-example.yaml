esphome:
  name: hwr-pump-example
  friendly_name: HWR Pump (Example)

# ==============================================================================
# Basic ALPHA HWR Example Configuration
# ==============================================================================
# 
# This example demonstrates basic telemetry monitoring without BLE pairing.
# Perfect for getting started or when you only need basic pump data.
#
# Telemetry Available:
# - Flow Rate, Head Pressure, Water Temperature, Motor Speed, Power
#
# For enhanced telemetry (voltage, current, all temperatures), 
# see hwr-pairing-example.yaml
#
# Setup Instructions:
# 1. Replace the MAC address below with your pump's BLE MAC address
# 2. Update WiFi credentials (or copy secrets-example.yaml to secrets.yaml)
# 3. Flash to your ESP32
#
# Device Discovery:
# - Find your pump's MAC using the ESPHome Bluetooth scan feature
# - Or use a BLE scanner app on your phone
# - MAC format: "AA:BB:CC:DD:EE:FF"
# ==============================================================================

substitutions:
  mac_address: "00:00:00:00:00:00"  # ← CHANGE THIS to your pump's MAC

packages:
  alpha_hwr: github://eman/esphome-alpha-hwr/packages/alpha_hwr_base.yaml@v0.5.0

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

wifi:
  ssid: "test-wifi"
  password: "test-password"
  fast_connect: true
  ap:
    ssid: hwr-pump-fallback
    password: "test-ap12"

captive_portal:

logger:
  level: DEBUG

api:
  encryption:
    key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

ota:
  - platform: esphome
    password: "test-ota"

# Additional Sensors (optional)
sensor:  
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"

binary_sensor:
  - platform: status
    name: "HWR Pump Status"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "WiFi SSID"
    bssid:
      name: "WiFi BSSID"
    mac_address:
      name: "WiFi MAC"

button:
  - platform: restart
    name: "Restart HWR Pump"

