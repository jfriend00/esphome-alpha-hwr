esphome:
  name: hwr-pairing-example
  friendly_name: "HWR Pump (Enhanced)"

# ==============================================================================
# Enhanced ALPHA HWR Example Configuration (with BLE Pairing)
# ==============================================================================
# 
# This example demonstrates FULL telemetry monitoring with BLE pairing/bonding.
# Use this when you need complete pump diagnostics including voltage and current.
#
# Enhanced Telemetry Available:
# - Grid Voltage (AC), Motor Current
# - Water, PCB, and Control Box temperatures
# - Flow Rate, Head Pressure, Motor Speed, Power
# - Pairing Status plus schedule/diagnostic text sensors
#
# Setup Instructions:
# 1. Replace the MAC address below with your pump's BLE MAC address
# 2. Update WiFi credentials
# 3. Flash to your ESP32
# 4. On first connection, the pump will pair/bond automatically
#    - Bonding keys are stored in NVS flash
#    - Subsequent connections will use stored keys (no re-pairing needed)
#
# Note: BLE pairing is required to access voltage and current sensors.
# The component handles this automatically when enable_pairing: true.
# ==============================================================================

substitutions:
  mac_address: "00:00:00:00:00:00"  # ← CHANGE THIS to your pump's MAC

packages:
  alpha_hwr: github://eman/esphome-alpha-hwr/packages/alpha_hwr_pairing.yaml@v0.4.0

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

wifi:
  ssid: "test-wifi"
  password: "test-password"
  fast_connect: true

logger:
  level: DEBUG

api:
  encryption:
    key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

ota:
  - platform: esphome
    password: "test-ota"

# Additional Sensors (optional)
sensor:
  - platform: uptime
    name: "Uptime"

binary_sensor:
  - platform: status
    name: "Online Status"

button:
   - platform: restart
     name: "Restart Device"

# Optional: For pump control, schedule management, and mode selection,
# see: hwr-pump-schedule-example.yaml
