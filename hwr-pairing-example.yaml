esphome:
  name: hwr-pairing-example
  friendly_name: "HWR Pump (Enhanced)"

# This configuration demonstrates BLE pairing/bonding and enhanced telemetry
# (Voltage, Current, Pairing Status).

external_components:
  - source:
      type: local
      path: components
    components: [alpha_hwr]

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

wifi:
  ssid: "test-wifi"
  password: "test-password"

logger:
  level: DEBUG

api:
  encryption:
    key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

esp32_ble_tracker:
  scan_parameters:
    interval: 1.1s
    window: 1.1s

ble_client:
  - mac_address: "00:00:00:00:00:00" # Replace with your pump's MAC
    id: hwr_pump_client

alpha_hwr:
  ble_client_id: hwr_pump_client
  enable_pairing: true  # Enable BLE pairing for enhanced telemetry
  pairing_status:
    name: "Pairing Status"
  voltage:
    name: "Grid Voltage"
  current:
    name: "Motor Current"
  power:
    name: "Power Consumption"
  rpm:
    name: "Motor Speed"
  flow:
    name: "Flow Rate"
  head:
    name: "Head Pressure"
  temp_media:
    name: "Water Temperature"
  temp_converter:
    name: "Converter Temperature"
  temp_pcb:
    name: "PCB Temperature"
  temp_control_box:
    name: "Control Box Temperature"

sensor:
  - platform: uptime
    name: "Uptime"

binary_sensor:
  - platform: status
    name: "Online Status"
