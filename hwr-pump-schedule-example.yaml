# ==============================================================================
# ALPHA HWR Schedule Management Example
# ==============================================================================
#
# This example demonstrates full pump monitoring plus schedule management
# and control mode selection in Home Assistant.
#
# Features Included (via packages):
# - Full telemetry with BLE pairing (flow, pressure, temp, voltage, current)
# - Schedule Enable/Disable switch
# - Control Mode selector (Constant Speed, Temperature Range, etc.)
# - Remote Mode buttons (enable/disable remote control)
# - Schedule editor (read/write individual schedule entries per day/layer)
#
# Setup Instructions:
# 1. Replace the MAC address below with your pump's BLE MAC address
# 2. Update WiFi credentials
# 3. Flash to your ESP32
#
# ==============================================================================

esphome:
  name: hwr-pump-schedule-example
  friendly_name: "HWR Pump (Schedule)"

substitutions:
  mac_address: "00:00:00:00:00:00"  # ← CHANGE THIS to your pump's MAC

packages:
  alpha_hwr: github://eman/esphome-alpha-hwr/packages/alpha_hwr_pairing.yaml@v0.5.0
  alpha_hwr_schedule: github://eman/esphome-alpha-hwr/packages/alpha_hwr_schedule.yaml@v0.5.0
  alpha_hwr_schedule_editor: github://eman/esphome-alpha-hwr/packages/alpha_hwr_schedule_editor.yaml@v0.5.0

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf

wifi:
  ssid: "test-wifi"
  password: "test-password"
  fast_connect: true

logger:
  level: DEBUG

api:
  encryption:
    key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

ota:
  - platform: esphome
    password: "test-ota"

button:
  - platform: restart
    name: "Restart Device"
