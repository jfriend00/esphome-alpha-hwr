# ==============================================================================
# ALPHA HWR Enhanced Package (with BLE Pairing)
# ==============================================================================
# 
# This package provides FULL telemetry from the Grundfos ALPHA HWR pump
# with BLE pairing/bonding enabled for authenticated access.
#
# Enhanced Telemetry Included:
# - All sensors from alpha_hwr_base.yaml PLUS:
# - AC Voltage (V) - Requires pairing
# - DC Voltage (V) - Requires pairing
# - Motor Current (A) - Requires pairing
# - Inlet Pressure (bar) - Requires pairing
# - PCB Temperature (°C)
# - Control Box Temperature (°C)
# - Active Alarms (text sensor) - Requires pairing
# - Active Warnings (text sensor) - Requires pairing
# - Pairing Status (binary sensor)
#
# Requirements:
# - ESP32 with BLE support
# - Substitutions: ${mac_address} must be defined
#
# Usage:
#   substitutions:
#     mac_address: "AA:BB:CC:DD:EE:FF"
#   
#   packages:
#     alpha_hwr: !include packages/alpha_hwr_pairing.yaml
#
# Note: On first connection, the pump will pair/bond with the ESP32.
# Bonding keys are stored in NVS flash for automatic reconnection.
# ==============================================================================

external_components:
  - source:
      type: local
      path: ../components
    components: [alpha_hwr, dhw_demand]

esp32_ble_tracker:
  scan_parameters:
    interval: 1.1s
    window: 1.1s

ble_client:
  - mac_address: ${mac_address}
    id: hwr_pump_client

# Ensure text_sensor component is included in build
text_sensor:

alpha_hwr:
   id: pump
   ble_client_id: hwr_pump_client
   enable_pairing: true  # Enable BLE pairing for enhanced telemetry
   
   # Pairing Status
   pairing_status:
     name: "Pairing Status"

   # Pump Link Status (coarse connection health) + latched last-failure detail
   pump_link_status:
     name: "Pump Link Status"
   pump_last_link_failure:
     name: "Pump Link Fault"
   
   # Enhanced Electrical (requires pairing)
   voltage:
     name: "AC Voltage"
   voltage_dc:
     name: "DC Voltage"
   current:
     name: "Motor Current"
   
   # Basic Telemetry
   power:
     name: "Power Consumption"
   rpm:
     id: motor_speed
     name: "Motor Speed"
   flow:
     name: "Flow Rate"
   head:
     name: "Head Pressure"
   head_rate:
     id: pump_head_rate_sensor
     name: "Head Pressure Rate"
     entity_category: diagnostic
   
   # Pressure Sensors (requires pairing)
   inlet_pressure:
     name: "Inlet Pressure"
   
   # Temperature Sensors (all)
   temp_media:
     name: "Water Temperature"
     id: temp_media_sensor
   temp_pcb:
     name: "PCB Temperature"
   temp_control_box:
     name: "Control Box Temperature"
   
   # Alarms & Warnings
   alarms:
     name: "Active Alarms"
   warnings:
     name: "Active Warnings"
   
   # Schedule Display
   schedule:
      name: "Weekly Schedule"
   
   # Single Events Display
   single_events:
      name: "Single Events"
   
   # Event Log Display
   event_log:
      name: "Event Log"
      entity_category: diagnostic
      internal: true
   
   # History Trends Display
   history:
      name: "History Trends"
      entity_category: diagnostic
      internal: true
   
   # Cycle Timestamps (last 10 cycles)
   cycle_timestamps:
      name: "Cycle Timestamps"
      entity_category: diagnostic
      internal: true
   
   # Operating Statistics (Diagnostic)
   start_count:
      name: "Start Count"
   operating_hours:
      name: "Operating Hours"

   # Clock Sync Diagnostics
   clock_diff:
      name: "Clock Drift"
      id: hwr_clock_diff
   last_clock_sync:
      name: "Last Clock Sync"
      id: hwr_last_clock_sync
   
   # Control Mode Display
   control_mode:
      name: "Control Mode"
      icon: "mdi:cog"
   
   # Device Information (Diagnostic)
   # These appear in the Device Info card's diagnostic section in Home Assistant
   serial_number:
      name: "Serial Number"
      entity_category: diagnostic
   software_version:
      name: "Software Version"  
      entity_category: diagnostic
   hardware_version:
      name: "Hardware Version"
      entity_category: diagnostic
   ble_version:
      name: "BLE Version"
      entity_category: diagnostic
   product_name:
      name: "Product Name"
      entity_category: diagnostic
