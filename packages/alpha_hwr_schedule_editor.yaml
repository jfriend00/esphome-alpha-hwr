# ==============================================================================
# ALPHA HWR Schedule Editor Package
# ==============================================================================
#
# Provides Home Assistant UI controls for managing individual schedule entries.
# Use the day selector, time inputs, and save/clear buttons to manage the pump's
# weekly schedule without writing YAML lambdas.
#
# Usage:
#   packages:
#     alpha_hwr_schedule_editor: !include packages/alpha_hwr_schedule_editor.yaml
#
# Requires: alpha_hwr_pairing.yaml (main component with id: pump)
# ==============================================================================

# Global variables to hold editor state
globals:
  - id: sched_edit_day
    type: int
    initial_value: '0'
  - id: sched_edit_layer
    type: int
    initial_value: '0'

select:
  - platform: template
    name: "Schedule Editor Day"
    id: sched_editor_day
    icon: "mdi:calendar"
    optimistic: true
    options:
      - "Monday"
      - "Tuesday"
      - "Wednesday"
      - "Thursday"
      - "Friday"
      - "Saturday"
      - "Sunday"
    initial_option: "Monday"
    set_action:
      - lambda: |-
          int idx = 0;
          if (x == "Tuesday") idx = 1;
          else if (x == "Wednesday") idx = 2;
          else if (x == "Thursday") idx = 3;
          else if (x == "Friday") idx = 4;
          else if (x == "Saturday") idx = 5;
          else if (x == "Sunday") idx = 6;
          id(sched_edit_day) = idx;
          
          // Load current entry for this day from cache
          uint8_t layer = (uint8_t)id(sched_edit_layer);
          esphome::alpha_hwr::ScheduleEntry entry;
          if (id(pump).get_cached_schedule_entry(layer, idx, &entry)) {
            if (entry.is_enabled()) {
              auto start_h = id(sched_start_hour);
              auto start_m = id(sched_start_minute);
              auto end_h = id(sched_end_hour);
              auto end_m = id(sched_end_minute);
              start_h->publish_state(entry.get_begin_hour());
              start_m->publish_state(entry.get_begin_minute());
              end_h->publish_state(entry.get_end_hour());
              end_m->publish_state(entry.get_end_minute());
              ESP_LOGI("sched_editor", "Loaded: %s %02d:%02d-%02d:%02d",
                       x.c_str(), entry.get_begin_hour(), entry.get_begin_minute(),
                       entry.get_end_hour(), entry.get_end_minute());
            } else {
              ESP_LOGI("sched_editor", "%s: no schedule (disabled)", x.c_str());
            }
          }

  - platform: template
    name: "Schedule Editor Layer"
    id: sched_editor_layer
    icon: "mdi:layers"
    optimistic: true
    options:
      - "Layer 0"
      - "Layer 1"
      - "Layer 2"
      - "Layer 3"
      - "Layer 4"
    initial_option: "Layer 0"
    set_action:
      - lambda: |-
          int idx = 0;
          if (x == "Layer 1") idx = 1;
          else if (x == "Layer 2") idx = 2;
          else if (x == "Layer 3") idx = 3;
          else if (x == "Layer 4") idx = 4;
          id(sched_edit_layer) = idx;

number:
  - platform: template
    name: "Schedule Start Hour"
    id: sched_start_hour
    icon: "mdi:clock-start"
    optimistic: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 6

  - platform: template
    name: "Schedule Start Minute"
    id: sched_start_minute
    icon: "mdi:clock-start"
    optimistic: true
    min_value: 0
    max_value: 59
    step: 5
    initial_value: 0

  - platform: template
    name: "Schedule End Hour"
    id: sched_end_hour
    icon: "mdi:clock-end"
    optimistic: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 8

  - platform: template
    name: "Schedule End Minute"
    id: sched_end_minute
    icon: "mdi:clock-end"
    optimistic: true
    min_value: 0
    max_value: 59
    step: 5
    initial_value: 0

button:
  - platform: template
    name: "Save Schedule Entry"
    icon: "mdi:content-save"
    on_press:
      - lambda: |-
          uint8_t layer = (uint8_t)id(sched_edit_layer);
          uint8_t day = (uint8_t)id(sched_edit_day);
          uint8_t sh = (uint8_t)id(sched_start_hour).state;
          uint8_t sm = (uint8_t)id(sched_start_minute).state;
          uint8_t eh = (uint8_t)id(sched_end_hour).state;
          uint8_t em = (uint8_t)id(sched_end_minute).state;
          
          static const char* DAYS[] = {"Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"};
          
          ESP_LOGI("sched_editor", "Saving: %s L%d %02d:%02d-%02d:%02d",
                   DAYS[day], layer, sh, sm, eh, em);
          
          esphome::alpha_hwr::ScheduleEntry entry(
            DAYS[day], sh, sm, eh, em, 0x02, layer, true);
          
          id(pump).set_schedule_entry(layer, day, entry, [](bool success) {
            if (success) {
              ESP_LOGI("sched_editor", "✓ Schedule entry saved");
            } else {
              ESP_LOGW("sched_editor", "✗ Failed to save schedule entry");
            }
          });

  - platform: template
    name: "Clear Schedule Entry"
    icon: "mdi:delete"
    on_press:
      - lambda: |-
          uint8_t layer = (uint8_t)id(sched_edit_layer);
          uint8_t day = (uint8_t)id(sched_edit_day);
          
          static const char* DAYS[] = {"Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"};
          ESP_LOGI("sched_editor", "Clearing: %s L%d", DAYS[day], layer);
          
          id(pump).clear_schedule_entry_async(layer, day, [](bool success) {
            if (success) {
              ESP_LOGI("sched_editor", "✓ Schedule entry cleared");
            } else {
              ESP_LOGW("sched_editor", "✗ Failed to clear schedule entry");
            }
          });
