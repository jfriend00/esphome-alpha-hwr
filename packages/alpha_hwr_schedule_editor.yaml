# ==============================================================================
# ALPHA HWR Schedule Editor Package
# ==============================================================================
#
# Provides Home Assistant UI controls for managing individual schedule entries.
# Use the day selector, time inputs, and save/clear buttons to manage the pump's
# weekly schedule without writing YAML lambdas.
#
# Usage:
#   packages:
#     alpha_hwr_schedule_editor: !include packages/alpha_hwr_schedule_editor.yaml
#
# Requires: alpha_hwr_pairing.yaml (main component with id: pump)
# ==============================================================================

# Global variables to hold editor state
globals:
  - id: sched_edit_day
    type: int
    initial_value: '0'
  - id: sched_edit_layer
    type: int
    initial_value: '0'

select:
  - platform: template
    name: "Schedule Editor Day"
    id: sched_editor_day
    icon: "mdi:calendar"
    optimistic: true
    options:
      - "Monday"
      - "Tuesday"
      - "Wednesday"
      - "Thursday"
      - "Friday"
      - "Saturday"
      - "Sunday"
    initial_option: "Monday"
    set_action:
      - lambda: |-
          int idx = 0;
          if (x == "Tuesday") idx = 1;
          else if (x == "Wednesday") idx = 2;
          else if (x == "Thursday") idx = 3;
          else if (x == "Friday") idx = 4;
          else if (x == "Saturday") idx = 5;
          else if (x == "Sunday") idx = 6;
          id(sched_edit_day) = idx;
          
          // Load current entry for this day from cache
          uint8_t layer = (uint8_t)id(sched_edit_layer);
          esphome::alpha_hwr::ScheduleEntry entry;
          if (id(pump).get_cached_schedule_entry(layer, idx, &entry)) {
            if (entry.is_enabled()) {
              auto start_h = id(sched_start_hour);
              auto start_m = id(sched_start_minute);
              auto end_h = id(sched_end_hour);
              auto end_m = id(sched_end_minute);
              start_h->publish_state(entry.get_begin_hour());
              start_m->publish_state(entry.get_begin_minute());
              end_h->publish_state(entry.get_end_hour());
              end_m->publish_state(entry.get_end_minute());
              ESP_LOGI("sched_editor", "Loaded: %s %02d:%02d-%02d:%02d",
                       x.c_str(), entry.get_begin_hour(), entry.get_begin_minute(),
                       entry.get_end_hour(), entry.get_end_minute());
            } else {
              ESP_LOGI("sched_editor", "%s: no schedule (disabled)", x.c_str());
            }
          }

  - platform: template
    name: "Schedule Editor Layer"
    id: sched_editor_layer
    icon: "mdi:layers"
    optimistic: true
    options:
      - "Layer 0"
      - "Layer 1"
      - "Layer 2"
      - "Layer 3"
      - "Layer 4"
    initial_option: "Layer 0"
    set_action:
      - lambda: |-
          int idx = 0;
          if (x == "Layer 1") idx = 1;
          else if (x == "Layer 2") idx = 2;
          else if (x == "Layer 3") idx = 3;
          else if (x == "Layer 4") idx = 4;
          id(sched_edit_layer) = idx;

number:
  - platform: template
    name: "Schedule Start Hour"
    id: sched_start_hour
    icon: "mdi:clock-start"
    optimistic: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 6

  - platform: template
    name: "Schedule Start Minute"
    id: sched_start_minute
    icon: "mdi:clock-start"
    optimistic: true
    min_value: 0
    max_value: 59
    step: 5
    initial_value: 0

  - platform: template
    name: "Schedule End Hour"
    id: sched_end_hour
    icon: "mdi:clock-end"
    optimistic: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 8

  - platform: template
    name: "Schedule End Minute"
    id: sched_end_minute
    icon: "mdi:clock-end"
    optimistic: true
    min_value: 0
    max_value: 59
    step: 5
    initial_value: 0

  # Single Event time inputs
  - platform: template
    name: "Single Event Start Month"
    id: single_event_start_month
    icon: "mdi:calendar-start"
    optimistic: true
    min_value: 1
    max_value: 12
    step: 1
    initial_value: 1

  - platform: template
    name: "Single Event Start Day"
    id: single_event_start_day
    icon: "mdi:calendar-start"
    optimistic: true
    min_value: 1
    max_value: 31
    step: 1
    initial_value: 1

  - platform: template
    name: "Single Event Start Hour"
    id: single_event_start_hour
    icon: "mdi:clock-start"
    optimistic: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 6

  - platform: template
    name: "Single Event Start Minute"
    id: single_event_start_min
    icon: "mdi:clock-start"
    optimistic: true
    min_value: 0
    max_value: 59
    step: 5
    initial_value: 0

  - platform: template
    name: "Single Event End Month"
    id: single_event_end_month
    icon: "mdi:calendar-end"
    optimistic: true
    min_value: 1
    max_value: 12
    step: 1
    initial_value: 1

  - platform: template
    name: "Single Event End Day"
    id: single_event_end_day
    icon: "mdi:calendar-end"
    optimistic: true
    min_value: 1
    max_value: 31
    step: 1
    initial_value: 1

  - platform: template
    name: "Single Event End Hour"
    id: single_event_end_hour
    icon: "mdi:clock-end"
    optimistic: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 8

  - platform: template
    name: "Single Event End Minute"
    id: single_event_end_min
    icon: "mdi:clock-end"
    optimistic: true
    min_value: 0
    max_value: 59
    step: 5
    initial_value: 0

  - platform: template
    name: "Single Event Clear Slot"
    id: single_event_clear_slot
    icon: "mdi:numeric"
    optimistic: true
    min_value: 0
    max_value: 34
    step: 1
    initial_value: 0

button:
  - platform: template
    name: "Save Schedule Entry"
    icon: "mdi:content-save"
    on_press:
      - lambda: |-
          uint8_t layer = (uint8_t)id(sched_edit_layer);
          uint8_t day = (uint8_t)id(sched_edit_day);
          uint8_t sh = (uint8_t)id(sched_start_hour).state;
          uint8_t sm = (uint8_t)id(sched_start_minute).state;
          uint8_t eh = (uint8_t)id(sched_end_hour).state;
          uint8_t em = (uint8_t)id(sched_end_minute).state;
          
          static const char* DAYS[] = {"Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"};
          
          ESP_LOGI("sched_editor", "Saving: %s L%d %02d:%02d-%02d:%02d",
                   DAYS[day], layer, sh, sm, eh, em);
          
          esphome::alpha_hwr::ScheduleEntry entry(
            DAYS[day], sh, sm, eh, em, 0x02, layer, true);
          
          id(pump).set_schedule_entry(layer, day, entry, [](bool success) {
            if (success) {
              ESP_LOGI("sched_editor", "✓ Schedule entry saved");
            } else {
              ESP_LOGW("sched_editor", "✗ Failed to save schedule entry");
            }
          });

  - platform: template
    name: "Clear Schedule Entry"
    icon: "mdi:delete"
    on_press:
      - lambda: |-
          uint8_t layer = (uint8_t)id(sched_edit_layer);
          uint8_t day = (uint8_t)id(sched_edit_day);
          
          static const char* DAYS[] = {"Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"};
          ESP_LOGI("sched_editor", "Clearing: %s L%d", DAYS[day], layer);
          
          id(pump).clear_schedule_entry_async(layer, day, [](bool success) {
            if (success) {
              ESP_LOGI("sched_editor", "✓ Schedule entry cleared");
            } else {
              ESP_LOGW("sched_editor", "✗ Failed to clear schedule entry");
            }
          });

  # --------------------------------------------------------------------------
  # Single Event (One-Time Schedule) Management
  # --------------------------------------------------------------------------

  - platform: template
    name: "Add Single Event"
    icon: "mdi:calendar-plus"
    on_press:
      - lambda: |-
          // Get event times from the number inputs
          uint16_t start_month = (uint16_t)id(single_event_start_month).state;
          uint16_t start_day_val = (uint16_t)id(single_event_start_day).state;
          uint16_t start_hour = (uint16_t)id(single_event_start_hour).state;
          uint16_t start_minute = (uint16_t)id(single_event_start_min).state;
          uint16_t end_month = (uint16_t)id(single_event_end_month).state;
          uint16_t end_day_val = (uint16_t)id(single_event_end_day).state;
          uint16_t end_hour = (uint16_t)id(single_event_end_hour).state;
          uint16_t end_minute = (uint16_t)id(single_event_end_min).state;
          
          // Build Unix timestamps using current year
          time_t now = ::time(nullptr);
          struct tm *t = localtime(&now);
          int year = t->tm_year;  // years since 1900
          
          struct tm start_tm = {};
          start_tm.tm_year = year;
          start_tm.tm_mon = start_month - 1;
          start_tm.tm_mday = start_day_val;
          start_tm.tm_hour = start_hour;
          start_tm.tm_min = start_minute;
          start_tm.tm_sec = 0;
          start_tm.tm_isdst = -1;
          time_t begin_ts = mktime(&start_tm);
          
          struct tm end_tm = {};
          end_tm.tm_year = year;
          end_tm.tm_mon = end_month - 1;
          end_tm.tm_mday = end_day_val;
          end_tm.tm_hour = end_hour;
          end_tm.tm_min = end_minute;
          end_tm.tm_sec = 0;
          end_tm.tm_isdst = -1;
          time_t end_ts = mktime(&end_tm);
          
          if (begin_ts >= end_ts) {
            ESP_LOGW("single_event", "Start must be before end");
            return;
          }
          
          // Find a free slot
          int slot = id(pump).find_free_single_event_slot();
          if (slot < 0) {
            ESP_LOGW("single_event", "No free single event slots");
            return;
          }
          
          esphome::alpha_hwr::services::SingleEvent event;
          event.index = (uint8_t)slot;
          event.enabled = true;
          event.action = 0x02;  // RUN
          event.begin_timestamp = (uint32_t)begin_ts;
          event.end_timestamp = (uint32_t)end_ts;
          
          ESP_LOGI("single_event", "Adding event slot %d: %02d/%02d %02d:%02d - %02d/%02d %02d:%02d",
                   slot, start_month, start_day_val, start_hour, start_minute,
                   end_month, end_day_val, end_hour, end_minute);
          
          id(pump).write_single_event(event, [](bool success) {
            if (success) {
              ESP_LOGI("single_event", "✓ Single event saved");
            } else {
              ESP_LOGW("single_event", "✗ Failed to save single event");
            }
          });

  - platform: template
    name: "Clear Single Event"
    icon: "mdi:calendar-remove"
    on_press:
      - lambda: |-
          uint8_t idx = (uint8_t)id(single_event_clear_slot).state;
          ESP_LOGI("single_event", "Clearing single event slot %d", idx);
          id(pump).clear_single_event(idx, [](bool success) {
            if (success) {
              ESP_LOGI("single_event", "✓ Single event cleared");
            } else {
              ESP_LOGW("single_event", "✗ Failed to clear single event");
            }
          });

  - platform: template
    name: "Refresh Single Events"
    icon: "mdi:calendar-refresh"
    on_press:
      - lambda: |-
          id(pump).read_single_events([](bool success, const std::vector<esphome::alpha_hwr::services::SingleEvent>& events) {
            if (success) {
              ESP_LOGI("single_event", "✓ Refreshed %zu events", events.size());
            }
          });
