# ==============================================================================
# ALPHA HWR Control Package
# ==============================================================================
#
# This package provides comprehensive UI controls for the Grundfos ALPHA HWR pump:
# - Pump run/stop switch
# - Schedule enable/disable switch
# - Remote mode buttons (enable/disable)
# - Control mode selector (10 operating modes)
# - Schedule refresh button
#
# Usage:
#   packages:
#     alpha_hwr_base: !include packages/alpha_hwr_pairing.yaml
#     alpha_hwr_controls: !include packages/alpha_hwr_controls.yaml
#
# Requirements:
# - Main alpha_hwr component must have id: pump
# - Motor Speed sensor must have id: motor_speed
#
# ==============================================================================

# Ensure switch and button components are included
switch:
  # Pump Run/Stop Control
  # Toggle pump on/off based on motor speed
  - platform: template
    name: "Pump Running"
    icon: "mdi:pump"
    optimistic: true
    turn_on_action:
      - lambda: |-
          ESP_LOGI("switch", "Starting pump...");
          bool result = id(pump).pump_start();
          ESP_LOGI("switch", "Start pump result: %s", result ? "SUCCESS" : "FAILED");
    turn_off_action:
      - lambda: |-
          ESP_LOGI("switch", "Stopping pump...");
          bool result = id(pump).pump_stop();
          ESP_LOGI("switch", "Stop pump result: %s", result ? "SUCCESS" : "FAILED");
  
  # Schedule Enable/Disable Control
  - platform: template
    name: "Schedule Enabled"
    icon: "mdi:calendar-clock"
    optimistic: false  # Read actual state from pump
    lambda: |-
      bool enabled = false;
      if (id(pump).get_schedule_state(&enabled)) {
        return enabled;
      }
      return {};  // Return unknown if state not cached yet
    turn_on_action:
      - lambda: |-
          ESP_LOGI("switch", "Enabling pump schedule...");
          bool result = id(pump).enable_schedule();
          ESP_LOGI("switch", "Enable schedule result: %s", result ? "SUCCESS" : "FAILED");
    turn_off_action:
      - lambda: |-
          ESP_LOGI("switch", "Disabling pump schedule...");
          bool result = id(pump).disable_schedule();
          ESP_LOGI("switch", "Disable schedule result: %s", result ? "SUCCESS" : "FAILED");

  # Remote Mode Toggle
  - platform: template
    name: "Remote Mode"
    icon: "mdi:remote"
    optimistic: false  # Read actual state from pump state tracking
    lambda: |-
      return id(pump).get_remote_enabled();
    turn_on_action:
      - lambda: |-
          ESP_LOGI("switch", "Enabling remote mode...");
          bool result = id(pump).enable_remote();
          ESP_LOGI("switch", "Enable remote result: %s", result ? "SUCCESS" : "FAILED");
    turn_off_action:
      - lambda: |-
          ESP_LOGI("switch", "Disabling remote mode (returning to Auto)...");
          bool result = id(pump).disable_remote();
          ESP_LOGI("switch", "Disable remote result: %s", result ? "SUCCESS" : "FAILED");

  # Temperature Range - AutoAdapt Toggle (Mode 27)
  - platform: template
    name: "Temperature AutoAdapt"
    id: temp_autoadapt
    icon: "mdi:auto-fix"
    optimistic: false
    disabled_by_default: false
    lambda: |-
      // Only show when in TEMPERATURE_RANGE mode
      if (!id(pump).is_mode_valid()) return {};
      if (id(pump).get_control_mode() != esphome::alpha_hwr::services::ControlMode::TEMPERATURE_RANGE) {
        return {};  // Hide when not in this mode
      }
      // TODO: Read actual AutoAdapt state from pump (Object 91, Sub 430, byte 0)
      return {};  // Return empty until we implement reading
    turn_on_action:
      - lambda: |-
          // Get current temperature range (or use defaults)
          float min_temp = 35.0f;  // TODO: Read from stored state
          float max_temp = 45.0f;  // TODO: Read from stored state
          
          ESP_LOGI("switch", "Enabling Temperature AutoAdapt");
          id(pump).set_temperature_range(min_temp, max_temp, true, [](bool success) {
            if (success) {
              ESP_LOGI("switch", "✓ AutoAdapt enabled successfully");
            } else {
              ESP_LOGW("switch", "Failed to enable AutoAdapt");
            }
          });
    turn_off_action:
      - lambda: |-
          // Get current temperature range (or use defaults)
          float min_temp = 35.0f;  // TODO: Read from stored state
          float max_temp = 45.0f;  // TODO: Read from stored state
          
          ESP_LOGI("switch", "Disabling Temperature AutoAdapt");
          id(pump).set_temperature_range(min_temp, max_temp, false, [](bool success) {
            if (success) {
              ESP_LOGI("switch", "✓ AutoAdapt disabled successfully");
            } else {
              ESP_LOGW("switch", "Failed to disable AutoAdapt");
            }
          });

button:
  - platform: restart
    name: "Restart HWR Pump"
  
  # Schedule Management Button
  - platform: template
    name: "Refresh Schedule Display"
    icon: "mdi:refresh"
    on_press:
      - lambda: |-
          ESP_LOGI("button", "Refreshing schedule display...");
          id(pump).update_schedule_display();
  
  # Device Information Button
  - platform: template
    name: "Read Device Info"
    icon: "mdi:information"
    on_press:
      - lambda: |-
          ESP_LOGI("button", "Manually triggering device info read...");
          id(pump).read_device_info();


select:
  # Pump Control Mode Selector  
  # Matches the Grundfos GO app's 5 main control modes for ALPHA HWR
  # Note: This is separate from the Weekly Schedule feature (enable/disable via Object 82, Sub 104)
  - platform: template
    name: "Pump Control Mode"
    id: pump_mode_select
    icon: "mdi:tune"
    optimistic: false  # Read actual state from pump state tracking
    options:
      - "Cycle Time Control"
      - "Constant Speed"
      - "Proportional Pressure"
      - "Temperature Control"
      - "Constant Flow"
      - "Constant Pressure"
    lambda: |-
      // Check if mode is valid before trying to display it
      if (!id(pump).is_mode_valid()) {
        return {};  // Return empty optional - select will show no selection
      }
      
      esphome::alpha_hwr::services::ControlMode mode = id(pump).get_control_mode();
      std::string mode_str;
      
      // Map protocol modes to UI labels (must match get_mode_name() output)
      if (mode == esphome::alpha_hwr::services::ControlMode::DHW_ON_OFF) {
        mode_str = "Cycle Time Control";
      } else if (mode == esphome::alpha_hwr::services::ControlMode::CONSTANT_SPEED) {
        mode_str = "Constant Speed";
      } else if (mode == esphome::alpha_hwr::services::ControlMode::PROPORTIONAL_PRESSURE) {
        mode_str = "Proportional Pressure";
      } else if (mode == esphome::alpha_hwr::services::ControlMode::TEMPERATURE_RANGE) {
        mode_str = "Temperature Control";
      } else if (mode == esphome::alpha_hwr::services::ControlMode::CONSTANT_FLOW) {
        mode_str = "Constant Flow";
      } else if (mode == esphome::alpha_hwr::services::ControlMode::CONSTANT_PRESSURE) {
        mode_str = "Constant Pressure";
      } else {
        return {};  // Return empty optional for unknown modes
      }
      return mode_str;
    set_action:
      - lambda: |-
          ESP_LOGI("select", "Setting mode to: %s", x.c_str());
          
          esphome::alpha_hwr::services::ControlMode mode;
          
          if (x == "Cycle Time Control") {
            mode = esphome::alpha_hwr::services::ControlMode::DHW_ON_OFF;
          } else if (x == "Constant Speed") {
            mode = esphome::alpha_hwr::services::ControlMode::CONSTANT_SPEED;
          } else if (x == "Proportional Pressure") {
            mode = esphome::alpha_hwr::services::ControlMode::PROPORTIONAL_PRESSURE;
          } else if (x == "Temperature Control") {
            mode = esphome::alpha_hwr::services::ControlMode::TEMPERATURE_RANGE;
          } else if (x == "Constant Flow") {
            mode = esphome::alpha_hwr::services::ControlMode::CONSTANT_FLOW;
          } else if (x == "Constant Pressure") {
            mode = esphome::alpha_hwr::services::ControlMode::CONSTANT_PRESSURE;
          } else {
            ESP_LOGW("select", "Unknown mode: %s", x.c_str());
            return;
          }
          
          bool result = id(pump).set_control_mode(mode);
          ESP_LOGI("select", "Set mode result: %s", result ? "SUCCESS" : "FAILED");

# ========== Control Mode Setpoints ==========
# Each control mode has specific setpoint parameters
# These number entities dynamically show/hide based on the active mode

number:
  # Constant Pressure Setpoint (Mode 0)
  - platform: template
    name: "Constant Pressure Setpoint"
    id: constant_pressure_setpoint
    icon: "mdi:gauge"
    unit_of_measurement: "m"
    min_value: 0.5
    max_value: 10.0
    step: 0.1
    mode: slider
    optimistic: true
    disabled_by_default: false
    set_action:
      - lambda: |-
          ESP_LOGI("number", "Setting constant pressure setpoint to %.2f m", x);
          id(pump).set_constant_pressure(x, [](bool success) {
            if (success) {
              ESP_LOGI("number", "✓ Pressure setpoint updated successfully");
            } else {
              ESP_LOGW("number", "Failed to update pressure setpoint");
            }
          });

  # Constant Speed (RPM) Setpoint (Mode 2)
