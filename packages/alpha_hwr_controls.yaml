    set_action:
      - lambda: |-
          // Get the current max temp (or use default 45°C if not set)
          float max_temp = 45.0f;  // TODO: Read from stored state
          bool autoadapt = true;    // TODO: Read from stored state
          
          ESP_LOGI("number", "Setting temperature range min to %.1f°C", x);
